<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f0c08">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Stillness — brown noise, generated continuously. A late-night object for focus and sleep.">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stillness">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Stillness — Brown Noise</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
  <!-- iOS Add-to-Home-Screen requires a PNG at this exact name to guarantee
       the logo shows up. SVG apple-touch-icons are unreliable across iOS
       versions — Safari sometimes falls back to a screenshot. -->
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <!-- Workbench: variable mono display with a BLCK axis for cassette-era
       engineering vibe. Reddit Mono: humanist monospace for labels & numbers.
       Both load with font-display: swap, system mono fallback meanwhile. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Reddit+Mono:wght@300;400;500;700&family=Workbench&display=swap">

  <link rel="stylesheet" href="./styles.css">
</head>
<body data-playing="false" data-idle="false" data-mounted="false">
  <div class="grain" aria-hidden="true"></div>

  <main class="stage">
    <article class="deck">
      <header class="deck-head">
        <h1 class="wordmark">Stillness</h1>
        <span class="stamp" aria-hidden="true">Type II &middot; Brown</span>
      </header>

      <div class="meter" id="meter" role="meter"
           aria-label="Output level"
           aria-valuemin="0" aria-valuemax="100" aria-valuenow="40"></div>

      <button id="toggle" class="lamp"
              type="button"
              aria-label="Play brown noise"
              aria-pressed="false">
        <span class="lamp-bezel" aria-hidden="true"></span>
        <span class="lamp-glow"  aria-hidden="true"></span>
        <span class="lamp-dot"   aria-hidden="true"></span>
      </button>

      <section class="control control-volume">
        <span class="control-label" id="volume-label">Volume</span>
        <div class="slider">
          <input id="volume" type="range" min="0" max="100" value="40"
                 aria-labelledby="volume-label">
          <div class="ticks" aria-hidden="true">
            <span class="tick" data-pos="0">0</span>
            <span class="tick"></span>
            <span class="tick"></span>
            <span class="tick"></span>
            <span class="tick"></span>
            <span class="tick" data-pos="50">50</span>
            <span class="tick"></span>
            <span class="tick"></span>
            <span class="tick"></span>
            <span class="tick"></span>
            <span class="tick" data-pos="100">100</span>
          </div>
        </div>
      </section>

      <section class="control control-timer">
        <span class="control-label">Sleep Timer</span>
        <div class="pills" role="group" aria-label="Sleep timer">
          <button class="pill" type="button" data-minutes="0"  aria-pressed="true">Off</button>
          <button class="pill" type="button" data-minutes="15" aria-pressed="false">15</button>
          <button class="pill" type="button" data-minutes="30" aria-pressed="false">30</button>
          <button class="pill" type="button" data-minutes="60" aria-pressed="false">60</button>
          <button class="pill" type="button" data-minutes="90" aria-pressed="false">90</button>
        </div>
        <span id="timer-remaining" class="timer-remaining" aria-live="polite"></span>
      </section>
    </article>
  </main>

  <button id="install" class="install" type="button">Install</button>

  <script src="./app.js" type="module"></script>
</body>
</html>
